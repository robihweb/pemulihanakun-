<title>My Linktree</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#0f172a);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    overflow:hidden;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:35px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.3);
}

.profile{
    width:120px;
    height:120px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(45deg,#00e5ff,#8b5cf6);
    padding:4px;
}

.profile img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
}

h1{
    color:white;
    margin-top:15px;
    font-size:28px;
}

p{
    color:#d1d5db;
    margin-bottom:25px;
}

.link{
    display:block;
    text-decoration:none;
    color:white;
    font-weight:600;
    padding:16px;
    margin:15px 0;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    transition:.3s;
}

.link:hover{
    transform:translateY(-4px) scale(1.03);
    background:linear-gradient(45deg,#06b6d4,#8b5cf6);
    box-shadow:0 0 20px rgba(139,92,246,.5);
}

.footer{
    color:#94a3b8;
    margin-top:20px;
    font-size:13px;
}

.bubble{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-150px);
    }
}
</style>
</head>
<body>

<div class="bubble" style="width:80px;height:80px;left:10%;animation-duration:9s;"></div>
<div class="bubble" style="width:50px;height:50px;left:70%;animation-duration:7s;"></div>
